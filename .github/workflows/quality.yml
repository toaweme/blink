name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # publish the report to the care dashboard
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - uses: toaweme/care@e684a2e9486d28281fe12d9fdd1284aa946c2825 # v0.9.4
        with:
          strict: true                                  # fail CI on a failing check
          publish-url: https://code.toawe.me/ingest?kind=care

      # publish this repo's code view to code.toawe.me
      - uses: toaweme/codereport@10bd1b60f6525ae86af9ba719ceedfc06c160271 # v0.3.0
        with:
          publish-url: https://code.toawe.me/ingest?kind=code

  # care only builds/lints on the runner's own GOOS/GOARCH, so a build break
  # confined to a platform-specific file (e.g. a windows-only source) slips
  # through and is only caught by goreleaser during a tag push. Cross-compile
  # every release target here so that failure surfaces on every PR instead.
  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build ./...
