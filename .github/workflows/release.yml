name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub release and upload assets
  id-token: write   # mint the OIDC token cosign uses for keyless signing

jobs:
  # gate the release on care: a tag only ships if care's checks pass on the
  # tagged commit.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: toaweme/care@e684a2e9486d28281fe12d9fdd1284aa946c2825 # v0.9.4
        with:
          strict: true

  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # goreleaser needs full history for the changelog

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: toaweme/care@e684a2e9486d28281fe12d9fdd1284aa946c2825 # v0.9.4
        with:
          install-only: true

      # care generates the conventional-commit notes (the org's single source),
      # which goreleaser then uses verbatim via --release-notes. Written to the
      # runner temp dir, not the work tree, so goreleaser's --clean check stays happy.
      - name: Generate release notes
        run: |
          notes="$RUNNER_TEMP/notes.md"
          care changelog | tee "$notes" || true
          if [ ! -s "$notes" ]; then
            echo "::warning::care changelog produced empty notes; using fallback"
            echo "See the commit history for changes in this release." > "$notes"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean --release-notes=${{ runner.temp }}/notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to toaweme/homebrew-tap so goreleaser can
          # push the updated formula. Set as an org or repo secret.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # PAT with write access to toaweme/scoop-bucket so goreleaser can
          # push the updated Scoop manifest. Set as an org or repo secret.
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
